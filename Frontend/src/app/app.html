<!-- 
    Notas:
    O preco esta em Reais(R$) pela proposta do site ser sobre energeticos disponiveis no Brasil
    Ja o resto esta em ingçes pelo objetivo de fazer o projeto majoritariamente em ingles.
-->
<main>
    <section>
        <h1>Monster Energy Drink Test Place</h1>
    </section>

<section [ngStyle]="{ display: 'flex', gap: '1rem', alignItems: 'flex-start', flexWrap: 'wrap' }">
    <p-card [ngStyle]="{ flex: '1 1 360px', marginBottom: '1rem' }">
            <ng-template pTemplate="title">
                {{ editingId !== null ? 'Edit drink' : 'Add new drink' }}
            </ng-template>

            <form (ngSubmit)="saveDrink()" class="p-fluid">
                <div style="display:flex;gap:.5rem;margin-top:.5rem">
                    <label for="name">Name</label>
                </div>
                <div>
                    <input id="name" pInputText name="name" [(ngModel)]="formModel.name" placeholder="Ex: Ultra White"
                        required />
                </div>

                <div style="display:flex;gap:.5rem;margin-top:.5rem">
                    <label for="flavor">Flavor</label>
                </div>
                <div>
                    <input id="flavor" pInputText name="flavor" [(ngModel)]="formModel.flavor"
                        placeholder="Ex: Orange Citrus" required />
                </div>

                <div style="display:flex;gap:.5rem;margin-top:.5rem">
                    <label for="price">Price(R$)</label>
                </div>
                <div>
                    <p-inputNumber inputId="price" name="price" [(ngModel)]="formModel.price" [mode]="'decimal'"
                        [min]="0" [step]="0.1"></p-inputNumber>
                </div>


                <div style="display:flex;gap:.5rem;margin-top:.5rem">
                    <label for="release">Release year</label>
                </div>
                <div>
                    <input id="release" pInputText type="number" name="release"
                        [(ngModel)]="formModel.release" />
                </div>

                <div style="display:flex;gap:.5rem;margin-top:.5rem">
                    <p-checkbox name="sugarFree" [(ngModel)]="formModel.sugarFree" binary="true"></p-checkbox>
                    <label for="sugarFree">Sugar free</label>
                </div>

                <div style="display:flex;gap:.5rem;margin-top:.5rem">
                    <button pButton type="submit" label="{{ editingId !== null ? 'Update drink' : 'Create drink' }}"
                        icon="pi pi-check"></button>
                    <button *ngIf="editingId !== null" pButton type="button" class="p-button-secondary" label="Cancel"
                        (click)="cancelEdit()"></button>
                </div>
            </form>
        </p-card>

        <p-card [ngStyle]="{ flex: '2 1 120vh' }">
            <ng-template pTemplate="title">Current catalog</ng-template>

            <p-table [value]="drinks">
                <ng-template pTemplate="header">
                    <tr>
                        <th>Name</th>
                        <th>Flavor</th>
                        <th>Price</th>
                        <th>Release</th>
                        <th>SugarFree</th>
                        <th>Actions</th>
                    </tr>
                </ng-template>

                <ng-template pTemplate="body" let-drink>
                    <tr>
                        <td>{{drink.name}}</td>
                        <td>{{drink.flavor}}</td>
                        <td>{{drink.price.toFixed(2)}} </td>
                        <td>{{drink.release}}</td>
                        <td>{{drink.sugarFree ? 'Yes' : 'No'}}</td>
                        <td>
                            <p-button icon="pi pi-pencil" severity="secondary" (click)="startEdit(drink)" />
                            <p-button icon="pi pi-trash" severity="danger" (click)="deleteDrink(drink.id)" />
                        </td>
                    </tr>
                </ng-template>
            </p-table>
        </p-card>
    </section>
</main>
